services:
  - type: web
    name: discord-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USERNAME
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: DISCORD_STATS_CHANNEL_ID
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GUILD_ID
        sync: false